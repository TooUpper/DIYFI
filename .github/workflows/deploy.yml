name: Deploy Rspress site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json # 关键：指定docs目录的依赖缓存路径
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies (在docs目录执行)
        run: cd docs && npm install # 关键：先进入docs目录再安装依赖
      - name: Build with Rspress (在docs目录执行)
        run: cd docs && npm run build # 关键：进入docs目录执行构建
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/doc_build # 关键：指定docs目录下的构建产物路径

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4